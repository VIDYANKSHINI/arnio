name: PR Guard

on:
  pull_request:
    branches: [ "main" ]

jobs:
  guard-sensitive-paths:
    name: Guard Sensitive Paths and Root Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for unauthorized file changes
        run: python3 .github/scripts/pr_guard.py
